apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: soccerize-frontend-ingress
  namespace: soccerize-app
spec:
  rules:
    - host: soccerize.local
      http:
        paths:
          - path: /config/
            pathType: Prefix
            backend:
              service:
                name: frontend-svc
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-svc
                port:
                  number: 80
